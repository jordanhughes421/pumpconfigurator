services:
  postgres:
    image: postgres:16
    container_name: magnumopus-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-magnumopus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-magnumopus}
      POSTGRES_DB: ${POSTGRES_DB:-magnumopus}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
